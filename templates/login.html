<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion au chat</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <h1>Connexion</h1>

    <form method="POST">
      <label>Pseudo :</label>
      <input type="text" name="pseudo" id="pseudoInput" required>

      <label>Code d'accès :</label>
      <input type="password" name="code" required>

      <button type="submit">Entrer</button>

      {% if error %}
        <p class="error">{{ error }}</p>
      {% endif %}
    </form>
  </div>

  <script>
    // Remplit automatiquement le pseudo si déjà enregistré
    const savedPseudo = localStorage.getItem("pseudo");
    if (savedPseudo) {
      document.getElementById("pseudoInput").value = savedPseudo;
    }
  </script>
</body>
</html>
