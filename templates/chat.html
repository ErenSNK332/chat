<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Chat</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <div class="container">
    <h1>Chat</h1>
    <p>Connecté en tant que : <strong>{{ pseudo }}</strong></p>

    {% if is_admin %}
      <button id="toggleDeleteMode">Mode suppression</button>
      <button id="banMode">Mode bannir</button>
    {% endif %}

    <div id="messages" class="messages"></div>

    <div class="input-area">
      <input type="text" id="messageInput" placeholder="Écris un message...">
      <button id="sendBtn">Envoyer</button>
    </div>

    <button id="cryptoBtn" class="crypto-btn">
      Crypter / Décrypter un message
    </button>
  </div>

  <script>
    const pseudo = "{{ pseudo }}";
    const isAdmin = {{ "true" if is_admin else "false" }};
    localStorage.setItem("pseudo", pseudo);

    function pseudoToColor(pseudo) {
      let hash = 0;
      for (let i = 0; i < pseudo.length; i++) {
        hash = pseudo.charCodeAt(i) + ((hash << 5) - hash);
      }
      const c = (hash & 0x00FFFFFF).toString(16).toUpperCase();
      return "#" + "00000".substring(0, 6 - c.length) + c;
    }

    function loadMessages() {
      fetch("/messages")
        .then(res => res.json())
        .then(data => {
          const container = document.getElementById("messages");
          container.innerHTML = "";

          data.forEach((msg, index) => {
            const div = document.createElement("div");
            let color = pseudoToColor(msg.pseudo);
            if (msg.pseudo === "Admin") color = "#ff4444";

            div.innerHTML = `<strong style="color:${color}">${msg.pseudo}</strong> : ${msg.text}`;

            if (deleteMode && isAdmin) {
              div.style.cursor = "pointer";
              div.onclick = () => {
                fetch("/delete", {
                  method: "POST",
                  headers: {"Content-Type": "application/json"},
                  body: JSON.stringify({ index })
                }).then(() => loadMessages());
              };
            }

            if (banMode && isAdmin) {
              div.style.cursor = "pointer";
              div.onclick = () => {
                fetch("/ban", {
                  method: "POST",
                  headers: {"Content-Type": "application/json"},
                  body: JSON.stringify({ pseudo: msg.pseudo })
                }).then(() => loadMessages());
              };
            }

            container.appendChild(div);
          });
        });
    }

    document.getElementById("sendBtn").onclick = () => {
      const text = document.getElementById("messageInput").value;
      fetch("/send", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ text })
      }).then(() => {
        document.getElementById("messageInput").value = "";
        loadMessages();
      });
    };

    let deleteMode = false;
    let banMode = false;

    document.getElementById("toggleDeleteMode")?.addEventListener("click", () => {
      deleteMode = !deleteMode;
      banMode = false;
      alert(deleteMode ? "Mode suppression activé" : "Mode suppression désactivé");
    });

    document.getElementById("banMode")?.addEventListener("click", () => {
      banMode = !banMode;
      deleteMode = false;
      alert(banMode ? "Mode bannir activé" : "Mode bannir désactivé");
    });

    document.getElementById("cryptoBtn").onclick = () => {
      window.open("https://crypsite.netlify.app", "_blank");
    };

    setInterval(loadMessages, 1000);
    loadMessages();
  </script>

</body>
</html>
